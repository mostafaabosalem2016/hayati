<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="حياتي">
<meta name="theme-color" content="#6B3A2A">
<title>حياتي</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#FDF6EE;color:#2C1A0E;direction:rtl;min-height:100vh}
input,textarea,select{font-family:Arial,sans-serif;outline:none;font-size:14px;color:#2C1A0E}
input[type=range]{width:100%;accent-color:#C8894A}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#D4B896;border-radius:4px}
.page{display:none}
.page.active{display:block}
#app{padding-bottom:80px}
/* Header */
#header{background:linear-gradient(135deg,#6B3A2A,#C8894A);padding:10px 16px;color:white;position:sticky;top:0;z-index:100}
#back-btn{background:none;border:none;color:white;font-size:14px;cursor:pointer;padding:0;margin-bottom:4px;display:none;font-family:Arial}
.hr{display:flex;align-items:center;gap:10px}
/* Nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #EDD5B3;display:flex;z-index:200;overflow-x:auto}
.nb{flex:0 0 auto;min-width:56px;background:none;border:none;cursor:pointer;padding:6px 3px;display:flex;flex-direction:column;align-items:center;font-family:Arial;color:#999;border-top:2px solid transparent;font-size:9px}
.nb span:first-child{font-size:18px;margin-bottom:1px}
.nb.active{color:#C8894A;border-top-color:#C8894A}
/* Backup bar */
#bbar{background:#2C1A0E;padding:6px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
#bbar > span{font-size:11px;color:#D4B896}
.bbs{display:flex;gap:6px;flex-wrap:wrap}
.bb{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:bold;cursor:pointer;border:none;font-family:Arial}
/* Body */
.body{padding:14px;max-width:520px;margin:0 auto}
/* Cards */
.card{background:#FFF8F0;border-radius:14px;padding:14px;border:1px solid #EDD5B3}
.hc{background:#FFF8F0;border-radius:14px;padding:14px;border:1px solid #EDD5B3;text-align:center;cursor:pointer}
.fb{background:#FFF8F0;border-radius:14px;padding:14px;border:1px solid #EDD5B3;margin-bottom:14px}
.sec-block{background:#FFF8F0;border-radius:14px;padding:14px;border:1px solid #EDD5B3;margin-bottom:12px}
/* Inputs */
.inp{padding:9px 12px;border-radius:10px;border:1px solid #EDD5B3;background:#FDF6EE;width:100%;font-size:14px;color:#2C1A0E;display:block}
.inp:focus{border-color:#C8894A}
.ta{padding:9px 12px;border-radius:10px;border:1px solid #EDD5B3;background:#FDF6EE;width:100%;resize:none;font-size:14px;color:#2C1A0E;line-height:1.8;display:block}
.ta:focus{border-color:#C8894A}
/* Buttons */
.bm{padding:10px 16px;border-radius:10px;background:#C8894A;color:white;border:none;cursor:pointer;font-size:14px;font-weight:bold;font-family:Arial}
.bd{width:100%;padding:11px;border-radius:12px;background:#6B3A2A;color:white;border:none;cursor:pointer;font-size:14px;font-weight:bold;margin-bottom:12px;font-family:Arial;display:block}
.bs{padding:6px 10px;border-radius:8px;background:#F0E6D6;color:#555;border:none;cursor:pointer;font-size:12px;font-family:Arial}
.bc{padding:10px 14px;border-radius:10px;background:transparent;color:#999;border:1px solid #EDD5B3;cursor:pointer;font-size:14px;font-family:Arial}
.bd0{background:none;border:none;color:#C8894A;font-size:14px;cursor:pointer;padding:2px 4px}
.fr{display:flex;gap:8px;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Misc */
.tag{font-size:11px;background:#F0E6D6;color:#6B3A2A;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.empty{text-align:center;padding:30px 0;color:#bbb;font-size:14px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:white;flex-shrink:0}
.lbl{font-size:12px;color:#B09070;margin-bottom:5px}
.emb{font-size:20px;cursor:pointer;border-radius:8px;padding:2px 5px;border:2px solid transparent;background:transparent}
.emb.sel{background:#F5DEC8;border-color:#C8894A}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px}
.tw{overflow-x:auto;border-radius:10px;border:1px solid #EDD5B3;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#6B3A2A;color:white;padding:7px 8px;text-align:right;white-space:nowrap}
td{padding:7px 8px;vertical-align:top;border-bottom:1px solid #EDD5B3}
tr:nth-child(even) td{background:#FFF8F0}
tr:nth-child(odd) td{background:#FDF6EE}
.iframe-pg{height:calc(100vh - 115px)}
.iframe-pg iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>

<div id="bbar">
  <span>💾 بياناتك محفوظة محلياً</span>
  <div class="bbs">
    <button class="bb" style="background:#C8894A;color:white" onclick="exportData()">📤 تصدير</button>
    <button class="bb" style="background:transparent;color:#C8894A;border:1px solid #C8894A" onclick="triggerImp('json')">📥 استيراد بيانات</button>
    <button class="bb" style="background:#6B3A2A;color:#D4B896;border:1px solid #C8894A" onclick="triggerImp('html')">➕ إضافة صفحة HTML</button>
  </div>
  <input id="imp-json" type="file" accept=".json" style="display:none" onchange="importJSON(event)">
  <input id="imp-html" type="file" accept=".html" style="display:none" onchange="importHTML(event)">
</div>

<div id="header">
  <button id="back-btn" onclick="goBack()">← رجوع</button>
  <div class="hr">
    <span id="h-icon" style="font-size:22px">🏠</span>
    <div>
      <div id="h-title" style="font-size:17px;font-weight:bold">الرئيسية</div>
      <div style="font-size:10px;opacity:.8;margin-top:1px">كل حاجة في مكان واحد</div>
    </div>
  </div>
</div>

<div id="app">
  <div id="pg-home"        class="page active body"></div>
  <div id="pg-finance"     class="page body"></div>
  <div id="pg-sav"         class="page body"></div>
  <div id="pg-thoughts"    class="page body"></div>
  <div id="pg-friends"     class="page body"></div>
  <div id="pg-frd"         class="page body"></div>
  <div id="pg-courses"     class="page body"></div>
  <div id="pg-cod"         class="page body"></div>
  <div id="pg-content"     class="page body"></div>
  <div id="pg-cs"          class="page body"></div>
  <div id="pg-yt-series"   class="page body"></div>
  <div id="pg-yt-ep"       class="page body"></div>
  <div id="pg-english"     class="page body"></div>
  <div id="pg-en-episodes" class="page body"></div>
  <div id="pg-en-ep-d"     class="page body"></div>
  <div id="pg-en-vocab"    class="page body"></div>
  <div id="pg-en-grammar"  class="page body"></div>
  <div id="pg-en-expr"     class="page body"></div>
  <div id="pg-schedule"    class="page iframe-pg"><iframe id="fr-sched" title="الجدول"></iframe></div>
  <div id="pg-ruqya"       class="page iframe-pg"><iframe id="fr-ruqya" title="الرقية"></iframe></div>
</div>

<div id="nav"></div>

<script>
// ═══════════ DATA ═══════════
const SK = "hayati-v2";
const AC = ["#E8A598","#A8C4A2","#9BB5D6","#C4A8D6","#D6C4A8","#A8D6C4","#D6A8B5"];
const EMOJIS = ["💛","🤝","🎉","🙌","💪","🥰","✨","🫂","🏆","🌟"];
let D = {
  finance:{transactions:[],savings:{me:[],wife:[]}},
  thoughts:{entries:[]},
  friends:{list:{}},
  courses:{list:{}},
  content:{books:[],podcasts:[],movies:[],youtube:[]},
  english:{vocab:[],episodes:[],grammar:[],expressions:[]},
  extraPages:[]
};

function load(){
  try{ var v=localStorage.getItem(SK); if(v){ var p=JSON.parse(v); D=Object.assign({},D,p); } }catch(e){}
  if(!D.finance.savings) D.finance.savings={me:[],wife:[]};
  if(!D.english) D.english={vocab:[],episodes:[],grammar:[],expressions:[]};
  if(!D.extraPages) D.extraPages=[];
}
function save(){ try{ localStorage.setItem(SK,JSON.stringify(D)); }catch(e){ alert("خطأ: "+e.message); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function today(){ return new Date().toISOString().slice(0,10); }
function ini(n){ return ((n||"").split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2))||"؟"; }
function h(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function n2(n){ return Number(n||0).toFixed(2); }

// ═══════════ NAV ═══════════
var curTab="home", pageStack=["home"], frLoaded={};

var BASE_TABS=[
  {id:"home",    icon:"🏠",label:"الرئيسية"},
  {id:"finance", icon:"💷",label:"المال"},
  {id:"thoughts",icon:"💭",label:"الأفكار"},
  {id:"friends", icon:"👥",label:"الأصدقاء"},
  {id:"courses", icon:"🎓",label:"التعلم"},
  {id:"content", icon:"📚",label:"المحتوى"},
  {id:"english", icon:"🇬🇧",label:"إنجليزي"},
  {id:"schedule",icon:"📅",label:"الجدول"},
  {id:"ruqya",   icon:"🤲",label:"الرقية"}
];

function getTabs(){
  var extras=(D.extraPages||[]).map(function(p){return {id:p.id,icon:"📄",label:(p.name||"").slice(0,6)};});
  return BASE_TABS.concat(extras);
}

function buildNav(){
  var tabs=getTabs();
  var html="";
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    var active=t.id===curTab?" active":"";
    html+='<button class="nb'+active+'" onclick="sw(\''+t.id+'\')"><span>'+t.icon+'</span><span>'+h(t.label)+'</span></button>';
  }
  document.getElementById("nav").innerHTML=html;
}

function showPg(id,title,icon,back){
  var all=document.querySelectorAll(".page");
  for(var i=0;i<all.length;i++) all[i].classList.remove("active");
  var pg=document.getElementById("pg-"+id);
  if(pg) pg.classList.add("active");
  document.getElementById("h-title").textContent=title;
  document.getElementById("h-icon").textContent=icon;
  document.getElementById("back-btn").style.display=back?"block":"none";
}

function sw(tab){
  curTab=tab; pageStack=[tab]; buildNav();
  var tabs=getTabs();
  var t=tabs.filter(function(x){return x.id===tab;})[0]||{label:tab,icon:"📄"};
  showPg(tab,t.label,t.icon,false);
  if(tab==="home")     rHome();
  else if(tab==="finance")  rFinance();
  else if(tab==="thoughts") rThoughts();
  else if(tab==="friends")  rFriends();
  else if(tab==="courses")  rCourses();
  else if(tab==="content")  rContent();
  else if(tab==="english")  rEnglish();
  else if(tab==="schedule") loadFr("schedule","fr-sched","الجدول");
  else if(tab==="ruqya")    loadFr("ruqya","fr-ruqya","الرقية");
  else if(tab.indexOf("extra-")===0) loadFr(tab,"fr-"+tab,(D.extraPages.filter(function(p){return p.id===tab;})[0]||{name:"صفحة"}).name);
}

function loadFr(tabId,frId,name){
  var fr=document.getElementById(frId);
  if(!fr||frLoaded[tabId]) return;
  var stored=localStorage.getItem("hayati-iframe-"+tabId);
  if(stored){ fr.srcdoc=stored; frLoaded[tabId]=true; }
  else {
    fr.srcdoc='<html dir="rtl"><body style="font-family:Arial;padding:30px;background:#FDF6EE;text-align:center"><h2 style="color:#6B3A2A;margin-bottom:16px">'+name+'</h2><p style="color:#888">اضغط ➕ إضافة صفحة HTML في الشريط العلوي</p></body></html>';
  }
}

function goBack(){
  pageStack.pop();
  var prev=pageStack[pageStack.length-1]||curTab;
  var tabs=getTabs();
  var t=tabs.filter(function(x){return x.id===prev;})[0]||{label:prev,icon:"📄"};
  showPg(prev,t.label,t.icon,pageStack.length>1);
  if(prev==="home")         rHome();
  else if(prev==="friends") rFriends();
  else if(prev==="courses") rCourses();
  else if(prev==="content") rContent();
  else if(prev==="english") rEnglish();
  else if(prev==="yt-series") rYTS(window._sid);
  else if(prev==="cs")      rCS(window._sec);
  else if(prev==="en-episodes") rEnEps();
  else if(prev==="en-vocab")    rEnVocab();
  else if(prev==="en-grammar")  rEnGr();
  else if(prev==="en-expr")     rEnEx();
  else sw(curTab);
}

function nav2(pgId,title,icon,fn){
  pageStack.push(pgId);
  showPg(pgId,title,icon,true);
  if(fn) fn();
}

function pg(id){ return document.getElementById("pg-"+id); }
function set(id,html){ var el=document.getElementById("pg-"+id); if(el) el.innerHTML=html; }

// ═══════════ HOME ═══════════
function rHome(){
  var fi=D.finance;
  var tIn=0,tOut=0;
  fi.transactions.forEach(function(t){ if(t.type==="in") tIn+=Number(t.amount); else tOut+=Number(t.amount); });
  var meSav=0,wfSav=0;
  (fi.savings.me||[]).forEach(function(t){ meSav+=(t.type==="in"?1:-1)*Number(t.amount); });
  (fi.savings.wife||[]).forEach(function(t){ wfSav+=(t.type==="in"?1:-1)*Number(t.amount); });
  var bal=tIn-tOut;

  var cards=[
    ["💷","الرصيد","£"+n2(bal),"finance","#A8C4A2"],
    ["🏦","الادخار","£"+n2(meSav+wfSav),"finance","#9BB5D6"],
    ["💭","الأفكار",D.thoughts.entries.length+" فكرة","thoughts","#C4A8D6"],
    ["👥","الأصدقاء",Object.keys(D.friends.list).length+" صديق","friends","#E8A598"],
    ["🎓","الدورات",Object.keys(D.courses.list).length+" دورة","courses","#D6C4A8"],
    ["🇬🇧","الإنجليزي",(D.english.episodes.length+D.english.vocab.length)+" عنصر","english","#A8D6C4"],
    ["📅","الجدول","اضغط","schedule","#D6A8B5"],
    ["🤲","الرقية","اضغط","ruqya","#C4A8D6"]
  ];

  var html='<div style="font-size:16px;font-weight:bold;color:#6B3A2A;margin-bottom:14px">أهلاً! 👋 إيه جديدك؟</div><div class="g2">';
  for(var i=0;i<cards.length;i++){
    var c=cards[i];
    html+='<div class="hc" style="border-top:3px solid '+c[4]+'" onclick="sw(\''+c[3]+'\')"><div style="font-size:24px;margin-bottom:4px">'+c[0]+'</div><div style="font-size:12px;color:#888">'+h(c[1])+'</div><div style="font-size:14px;font-weight:bold;margin-top:2px">'+h(c[2])+'</div></div>';
  }
  var extras=D.extraPages||[];
  for(var j=0;j<extras.length;j++){
    var ep=extras[j];
    html+='<div style="position:relative"><div class="hc" style="border-top:3px solid #D6C4A8" onclick="sw(\''+ep.id+'\')"><div style="font-size:22px;margin-bottom:4px">📄</div><div style="font-size:12px;color:#888">'+h(ep.name)+'</div><div style="font-size:11px;color:#C8894A;margin-top:2px">مفتوح</div></div><button onclick="delEP(\''+ep.id+'\')" style="position:absolute;top:4px;left:4px;background:none;border:none;color:#E8A598;font-size:14px;cursor:pointer">✕</button></div>';
  }
  html+='</div>';
  set("home",html);
}

// ═══════════ FINANCE ═══════════
function rFinance(sf){
  var fi=D.finance;
  var txs=fi.transactions.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var tIn=0,tOut=0;
  txs.forEach(function(t){if(t.type==="in")tIn+=Number(t.amount);else tOut+=Number(t.amount);});
  var bal=tIn-tOut;
  var sv=fi.savings||{me:[],wife:[]};
  var meBal=0,wfBal=0;
  (sv.me||[]).forEach(function(t){meBal+=(t.type==="in"?1:-1)*Number(t.amount);});
  (sv.wife||[]).forEach(function(t){wfBal+=(t.type==="in"?1:-1)*Number(t.amount);});

  var html='<div class="g3" style="margin-bottom:12px">';
  html+='<div class="card" style="text-align:center;border-top:3px solid #A8C4A2;padding:10px"><div style="font-size:10px;color:#888">💚 دخل</div><div style="font-size:13px;font-weight:bold;margin-top:3px">£'+n2(tIn)+'</div></div>';
  html+='<div class="card" style="text-align:center;border-top:3px solid #E8A598;padding:10px"><div style="font-size:10px;color:#888">❤️ مصاريف</div><div style="font-size:13px;font-weight:bold;margin-top:3px">£'+n2(tOut)+'</div></div>';
  html+='<div class="card" style="text-align:center;border-top:3px solid #9BB5D6;padding:10px"><div style="font-size:10px;color:#888">💷 رصيد</div><div style="font-size:13px;font-weight:bold;margin-top:3px;color:'+(bal>=0?"#4a9c6d":"#c05050")+'">£'+n2(bal)+'</div></div>';
  html+='</div>';
  html+='<div class="g2" style="margin-bottom:12px">';
  html+='<div class="hc" style="border-top:3px solid #9BB5D6;padding:12px" onclick="rSav(\'me\')"><div style="font-size:11px;color:#888;margin-bottom:4px">🏦 ادخاري</div><div style="font-size:16px;font-weight:bold;color:'+(meBal>=0?"#4a9c6d":"#c05050")+'">£'+n2(meBal)+'</div><div style="font-size:10px;color:#C8894A;margin-top:3px">← تفاصيل</div></div>';
  html+='<div class="hc" style="border-top:3px solid #9BB5D6;padding:12px" onclick="rSav(\'wife\')"><div style="font-size:11px;color:#888;margin-bottom:4px">💑 ادخار زوجتي</div><div style="font-size:16px;font-weight:bold;color:'+(wfBal>=0?"#4a9c6d":"#c05050")+'">£'+n2(wfBal)+'</div><div style="font-size:10px;color:#C8894A;margin-top:3px">← تفاصيل</div></div>';
  html+='</div>';
  html+='<button class="bd" onclick="rFinance(true)">+ أضف معاملة</button>';
  if(sf){
    html+='<div class="fb"><div class="fr" style="margin-bottom:10px">';
    html+='<button id="tx-in" class="bs" style="flex:1;background:#A8C4A2;color:#2C1A0E" onclick="setTT(\'in\')">💚 دخل</button>';
    html+='<button id="tx-out" class="bs" style="flex:1;background:#E8A598;color:#2C1A0E" onclick="setTT(\'out\')">❤️ مصروف</button>';
    html+='</div>';
    html+='<input id="tx-lb" class="inp" placeholder="الوصف..." style="margin-bottom:8px">';
    html+='<input id="tx-am" class="inp" type="number" placeholder="المبلغ £" style="margin-bottom:8px">';
    html+='<select id="tx-ct" class="inp" style="margin-bottom:8px"><option>طعام</option><option>مواصلات</option><option>فواتير</option><option>ترفيه</option><option>تعليم</option><option>صحة</option><option>ملابس</option><option>عام</option></select>';
    html+='<input id="tx-dt" class="inp" type="date" value="'+today()+'" style="margin-bottom:8px">';
    html+='<div class="fr"><button class="bm" style="flex:1" onclick="addTx()">حفظ</button><button class="bc" onclick="rFinance()">إلغاء</button></div></div>';
  }
  html+='<div>';
  if(txs.length===0) html+='<div class="empty">لا توجد معاملات بعد</div>';
  for(var i=0;i<txs.length;i++){
    var t=txs[i];
    html+='<div class="card fr" style="margin-bottom:8px;padding:10px 12px"><div style="font-size:18px">'+(t.type==="in"?"💚":"❤️")+'</div><div style="flex:1;margin:0 10px"><div style="font-size:13px;font-weight:bold">'+h(t.label)+'</div><div style="font-size:11px;color:#999">'+(t.cat||"")+" · "+t.date+'</div></div><div style="font-size:13px;font-weight:bold;color:'+(t.type==="in"?"#4a9c6d":"#c05050")+'">'+(t.type==="in"?"+":"-")+"£"+n2(t.amount)+'</div><button class="bd0" onclick="delTx(\''+t.id+'\')">✕</button></div>';
  }
  html+='</div>';
  set("finance",html);
  window._txType="out";
}
function setTT(tp){ window._txType=tp; var i=document.getElementById("tx-in"),o=document.getElementById("tx-out"); if(i&&o){i.style.opacity=tp==="in"?"1":"0.5";o.style.opacity=tp==="out"?"1":"0.5";} }
function addTx(){ var lb=document.getElementById("tx-lb").value.trim(),am=document.getElementById("tx-am").value; if(!lb||!am) return; D.finance.transactions.unshift({id:uid(),type:window._txType||"out",label:lb,amount:am,cat:document.getElementById("tx-ct").value,date:document.getElementById("tx-dt").value||today()}); save(); rFinance(); }

var _sfreq="أسبوعي";
function rFriends(){
  var FREQS=["يومي","أسبوعي","شهري","حسب الفرصة"];
  var friends=Object.values(D.friends.list).sort(function(a,b){
    if(!a.lastContact&&!b.lastContact) return 0;
    if(!a.lastContact) return 1; if(!b.lastContact) return -1;
    return b.lastContact.localeCompare(a.lastContact);
  });
  var html='<div class="fb"><input id="fr-nm" class="inp" placeholder="اسم الصديق..." style="margin-bottom:8px"><div class="fr" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">';
  for(var i=0;i<FREQS.length;i++){
    html+='<button class="bs" onclick="selFreq(\''+FREQS[i]+'\')" style="background:'+(_sfreq===FREQS[i]?"#C8894A":"#F0E6D6")+';color:'+(_sfreq===FREQS[i]?"white":"#555")+'">'+FREQS[i]+'</button>';
  }
  html+='</div><button class="bd" style="margin-bottom:0" onclick="addFr()">+ أضف صديق</button></div>';
  if(friends.length===0) html+='<div class="empty">لا يوجد أصدقاء بعد</div>';
  for(var i=0;i<friends.length;i++){
    var f=friends[i];
    var ds=f.lastContact?Math.floor((new Date()-new Date(f.lastContact))/86400000):999;
    var dc=ds<=7?"#A8C4A2":ds<=30?"#D6C4A8":"#E8A598";
    var dt=f.lastContact?(ds===0?"اليوم":ds===1?"أمس":ds+" يوم"):"لم يتم التواصل";
    html+='<div class="card fr" style="margin-bottom:10px;cursor:pointer" onclick="opnFr(\''+f.id+'\')"><div class="av" style="background:'+f.color+'">'+ini(f.name)+'</div><div style="flex:1;margin:0 12px"><div style="font-size:15px;font-weight:bold">'+h(f.name)+'</div><div style="font-size:11px;color:#999">'+h(f.freq)+' · '+((f.moments||[]).length)+' لحظة</div><div style="font-size:11px;margin-top:2px"><span class="dot" style="background:'+dc+'"></span>'+dt+'</div></div><span style="color:#C8894A">←</span></div>';
  }
  set("friends",html);
}

function rEnEpD(id){
  var ep=D.english.episodes.filter(function(x){return x.id===id;})[0]; if(!ep) return;
  var blocks=[],lines=(ep.content||"").split("\n");
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var pc=(line.match(/\|/g)||[]).length;
    var tc=line.split("\t").length;
    var isSep=line.trim().match(/^[|\-+:\s]+$/)&&pc>=1;
    if(isSep) continue;
    var isT=(pc>=2)||(tc>=3);
    var last=blocks[blocks.length-1];
    if(isT){ if(last&&last.t==="tbl") last.lines.push(line); else blocks.push({t:"tbl",lines:[line]}); }
    else { if(last&&last.t==="txt") last.lines.push(line); else blocks.push({t:"txt",lines:[line]}); }
  }
  var rendered="";
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i];
    if(b.t==="txt"){
      var tx=b.lines.join("\n").trim();
      if(tx) rendered+='<div style="font-size:13px;line-height:2;color:#333;margin-bottom:14px;white-space:pre-wrap">'+h(tx)+'</div>';
    } else {
      var rows=[];
      for(var j=0;j<b.lines.length;j++){
        var l=b.lines[j];
        var row=l.indexOf("\t")>=0?l.split("\t"):l.replace(/^\|/,"").replace(/\|$/,"").split("|");
        row=row.map(function(c){return c.trim();});
        if(row.length>=2&&row[0]) rows.push(row);
      }
      if(!rows.length) continue;
      var mc=0; for(var j=0;j<rows.length;j++) if(rows[j].length>mc) mc=rows[j].length;
      var isH=rows[0]&&["word","النطق","english","عربي","ex","definition"].some(function(kw){return rows[0].join("").toLowerCase().indexOf(kw)>=0;});
      var hd=rows[0],dr=isH?rows.slice(1):rows;
      rendered+='<div class="tw"><table><thead><tr>';
      for(var j=0;j<hd.length;j++) rendered+='<th>'+h(hd[j])+'</th>';
      rendered+='</tr></thead><tbody>';
      for(var j=0;j<dr.length;j++){
        rendered+='<tr>';
        for(var k=0;k<mc;k++) rendered+='<td style="color:'+(k===0?"#2C1A0E":k===1?"#C8894A":"#555")+';font-weight:'+(k===0?"bold":"normal")+'">'+(dr[j][k]?h(dr[j][k]):"")+'</td>';
        rendered+='</tr>';
      }
      rendered+='</tbody></table></div>';
    }
  }
  var html='<div class="card" style="margin-bottom:12px"><div style="font-size:17px;font-weight:bold;margin-bottom:4px">'+h(ep.title)+'</div>'+(ep.source?'<div style="font-size:12px;color:#C8894A">📻 '+h(ep.source)+' · '+ep.date+'</div>':'<div style="font-size:11px;color:#bbb">'+ep.date+'</div>')+'</div>';
  html+=rendered;
  html+='<div class="fr" style="margin-top:14px"><button class="bs" style="flex:1;padding:10px;background:#9BB5D6;color:white" onclick="edEnEp(\''+id+'\')">✏️ تعديل</button><button class="bs" style="flex:1;padding:10px;background:#E8A598;color:#6B3A2A" onclick="delEnEp(\''+id+'\')">🗑 حذف</button></div>';
  set("en-ep-d",html);
}

function exportData(){
  var json=JSON.stringify(D,null,2);
  // Try Blob method first (works on HTTPS)
  try{
    var b=new Blob([json],{type:"application/json"});
    var u=URL.createObjectURL(b);
    var a=document.createElement("a");
    a.href=u; a.download="حياتي-backup-"+today()+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},100);
    return;
  }catch(e){}
  // Fallback: data URI
  try{
    var uri="data:application/json;charset=utf-8,"+encodeURIComponent(json);
    var a=document.createElement("a");
    a.href=uri; a.download="حياتي-backup-"+today()+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);},100);
    return;
  }catch(e){}
  // Last resort: show in textarea to copy
  var w=window.open("","_blank","width=600,height=400");
  if(w){
    w.document.write("<html><body dir='rtl' style='font-family:Arial;padding:20px'><h3>انسخ البيانات دي واحفظها:</h3><textarea style='width:100%;height:300px;font-size:11px'>"+json.replace(/</g,"&lt;")+"</textarea></body></html>");
  } else {
    // If popup blocked, put in a modal
    var d=document.createElement("div");
    d.style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;padding:20px;direction:rtl";
    d.innerHTML="<div style='background:white;border-radius:14px;padding:16px;height:100%'><div style='display:flex;justify-content:space-between;margin-bottom:10px'><b>انسخ البيانات واحفظها في ملف نصي:</b><button onclick='this.parentElement.parentElement.parentElement.remove()' style='border:none;background:#C8894A;color:white;border-radius:8px;padding:4px 12px'>إغلاق</button></div><textarea style='width:100%;height:80%;font-size:10px;border:1px solid #ccc;border-radius:8px;padding:8px' onclick='this.select()'>"+json+"</textarea></div>";
    document.body.appendChild(d);
  }
}
